name: Build Executables

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: minesweeper-linux

          - os: windows-latest
            artifact_name: minesweeper-windows

          - os: macos-latest
            artifact_name: minesweeper-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame-ce numpy pyinstaller

      - name: Build executable
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name minesweeper \
            main.py

      - name: Show dist folder
        run: |
          ls dist
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*